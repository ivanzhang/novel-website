services:
  backend:
    build: ./backend
    volumes:
      - db-data:/app/data
    environment:
      - JWT_SECRET=your-secret-key-change-in-production
      - DB_PATH=/app/data/novels.db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
