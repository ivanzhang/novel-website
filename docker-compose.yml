services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend/novels.db:/app/data/novels.db
      - ./storage/json/biquge:/app/storage/json/biquge:ro
    environment:
      - JWT_SECRET=${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      - DB_PATH=/app/data/novels.db
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http'); const req=http.get({host:'127.0.0.1', port:3000, path:'/api/health', timeout:3000}, (res)=>{ process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', ()=>process.exit(1)); req.on('timeout', ()=>{ req.destroy(); process.exit(1); });"
        ]
      start_period: 25s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
