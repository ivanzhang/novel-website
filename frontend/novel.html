<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="在线阅读中文小说">
  <meta property="og:type" content="book">
  <title>小说详情 - 中文小说阅读网</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📚 中文小说阅读网</h1>
    <div class="nav">
      <a href="index.html">返回首页</a>
      <a href="categories.html">分类</a>
      <a href="rankings.html">榜单</a>
      <a href="membership.html">会员中心</a>
    </div>
  </header>

  <div class="container">
    <div id="novelDetail"></div>
    <div id="chapterList"></div>
    <div id="recommendationsSection"></div>
  </div>

  <script src="runtime-config.js"></script>
  <script>
    const API_URL = window.NOVEL_APP_CONFIG.apiUrl;
    const token = localStorage.getItem('token');
    const urlParams = new URLSearchParams(window.location.search);
    const novelId = urlParams.get('id');
    const INITIAL_CHAPTER_BATCH_SIZE = 100;
    const CHAPTER_BATCH_INCREMENT = 100;
    const chapterListState = {
      chapters: [],
      visibleCount: 0,
      total: 0,
      page: 1,
      limit: 100,
      loading: false,
      loaded: false,
    };

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function updateMetaTag(selector, content) {
      const element = document.querySelector(selector);
      if (element && content) {
        element.setAttribute('content', content);
      }
    }

    function renderFallbackCover(title, className) {
      return `<div class="novel-cover novel-cover-fallback ${className}-fallback">${escapeHtml((title || '?').charAt(0))}</div>`;
    }

    function handleCoverError(image) {
      if (!image || !image.parentElement) return;
      image.onerror = null;
      image.parentElement.innerHTML = renderFallbackCover(image.dataset.title || '?', image.dataset.className || 'novel-detail-cover');
    }

    function renderCoverImage(url, title, className) {
      if (!url) {
        return renderFallbackCover(title, className);
      }

      return `<img class="${className}" src="${escapeHtml(url)}" alt="${escapeHtml(title)}" data-title="${escapeHtml(title)}" data-class-name="${className}" referrerpolicy="no-referrer" onerror="handleCoverError(this)">`;
    }

    function buildReadingHint(novel, progress) {
      if (progress && progress.chapter_number) {
        return `你已读到第 ${progress.chapter_number} 章，现在可以继续追更。`;
      }

      if (!novel.is_premium) {
        return '当前作品可直接开始阅读，适合先从首章试读判断是否继续追更。';
      }

      if (novel.free_chapters > 0) {
        return `这本作品前 ${novel.free_chapters} 章可免费试读，适合先看节奏和设定再决定是否开通会员。`;
      }

      return '这本作品以会员章节为主，适合先了解简介和目录后再开通阅读。';
    }

    function buildPrimaryAction(novel, progress) {
      if (!token) {
        return `<button class="btn-primary" onclick="location.href='login.html'">登录后开始阅读</button>`;
      }

      if (progress && progress.chapter_number) {
        return `<button class="btn-primary" onclick="continueReading(${progress.chapter_number})">继续阅读（第${progress.chapter_number}章）</button>`;
      }

      return `<button class="btn-primary" onclick="startReading()">开始阅读</button>`;
    }

    function buildReadingStatus(novel) {
      if (!novel.is_premium) {
        return '全本当前按普通章节开放，可直接开始阅读。';
      }

      if (novel.free_chapters > 0) {
        return `当前共 ${novel.chapter_count} 章，前 ${novel.free_chapters} 章可免费试读。`;
      }

      return `当前共 ${novel.chapter_count} 章，主要章节需要会员权限。`;
    }

    async function loadMemberCenter() {
      if (!token) return null;

      const response = await fetch(`${API_URL}/member-center`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        return null;
      }

      return response.json();
    }

    function buildMembershipConversionState(novel, memberCenter, progress) {
      if (!token) {
        return {
          title: '登录后可保存进度并继续追更',
          description: novel.is_premium
            ? `这本作品前 ${novel.free_chapters || 0} 章可试读，登录后可继续阅读并保存进度。`
            : '登录后可保存阅读进度、评分和书签，回来能直接继续阅读。',
          benefits: [
            '登录后自动保存阅读进度',
            novel.free_chapters > 0 ? `前 ${novel.free_chapters} 章支持试读` : '可先查看目录再决定是否追更',
            '后续可快速进入会员中心开通'
          ],
          primaryAction: `<button class="btn-primary" onclick="location.href='login.html'">登录后阅读</button>`,
          secondaryAction: `<button class="btn-secondary" onclick="scrollToCatalog()">先看目录</button>`
        };
      }

      const profile = memberCenter?.profile;
      const activeMember = Boolean(profile?.days_remaining > 0 && profile?.is_member);

      if (activeMember) {
        return {
          title: profile.days_remaining > 0 ? `会员有效中，剩余 ${profile.days_remaining} 天` : '会员有效中，可直接畅读',
          description: progress && progress.chapter_number
            ? `你已经读到第 ${progress.chapter_number} 章，可以直接继续追更全部章节。`
            : '当前会员状态有效，可直接开始阅读全部章节和后续更新内容。',
          benefits: [
            '可直接解锁后续 VIP 章节',
            '阅读进度、评分和书签自动同步',
            '可随时进入会员中心查看权益和有效期'
          ],
          primaryAction: progress && progress.chapter_number
            ? `<button class="btn-primary" onclick="continueReading(${progress.chapter_number})">继续阅读</button>`
            : `<button class="btn-primary" onclick="startReading()">开始阅读</button>`,
          secondaryAction: `<a class="btn-secondary btn-link" href="membership.html">查看会员中心</a>`
        };
      }

      return {
        title: novel.free_chapters > 0 ? `前 ${novel.free_chapters} 章可免费试读` : '后续章节含会员内容',
        description: novel.free_chapters > 0
          ? `试读后如想连续追更，开通会员即可直接解锁后续章节。`
          : '当前作品以会员章节为主，开通后可连续阅读后续内容。',
        benefits: [
          '解锁后续 VIP 章节',
          '阅读进度同步，换设备也能继续读',
          '会员中心可统一查看有效期和权益'
        ],
        primaryAction: `<a class="btn-primary btn-link" href="membership.html">立即开通会员</a>`,
        secondaryAction: novel.free_chapters > 0
          ? `<button class="btn-secondary" onclick="startReading()">先试读前 ${novel.free_chapters} 章</button>`
          : `<button class="btn-secondary" onclick="scrollToCatalog()">先看目录</button>`
      };
    }

    function renderMembershipConversionCard(novel, memberCenter, progress) {
      const state = buildMembershipConversionState(novel, memberCenter, progress);

      return `
        <section class="novel-membership-card">
          <p class="novel-membership-kicker">当前阅读状态</p>
          <h3>${escapeHtml(state.title)}</h3>
          <p class="novel-membership-copy">${escapeHtml(state.description)}</p>
          <div class="novel-membership-benefits">
            ${state.benefits.map((benefit) => `<span class="novel-membership-benefit">${escapeHtml(benefit)}</span>`).join('')}
          </div>
          <div class="novel-membership-actions">
            ${state.primaryAction}
            ${state.secondaryAction}
          </div>
        </section>
      `;
    }

    function renderChapterItems(chapters) {
      return chapters.map((chapter) => `
        <div class="chapter-item ${chapter.needs_premium ? 'premium' : ''}" onclick="readChapter(${chapter.chapter_number})">
          <span class="chapter-title">第${chapter.chapter_number}章 ${escapeHtml(chapter.title)}</span>
          <span class="chapter-info">
            ${chapter.needs_premium ? '<span class="lock-icon">🔒 会员</span>' : '<span class="free-icon">✓ 免费</span>'}
            ${chapter.word_count || 0}字
          </span>
        </div>
      `).join('');
    }

    function renderNovelDetail(novel, ratings, progress, userRating) {
      document.getElementById('novelDetail').innerHTML = `
        <section class="novel-header novel-hero">
          <div class="novel-hero-cover">
            ${renderCoverImage(novel.cover_url, novel.title, 'novel-detail-cover')}
          </div>
          <div class="novel-hero-body">
            <p class="novel-kicker">作品详情</p>
            <h2>${escapeHtml(novel.title)}</h2>
            <p class="novel-meta">
              作者：${escapeHtml(novel.author)}
              ${novel.primary_category ? ` | <a class="novel-category-link" href="index.html?category=${encodeURIComponent(novel.primary_category)}">${escapeHtml(novel.primary_category)}</a>` : ''}
              | 共${novel.chapter_count}章
              ${novel.source_category && novel.source_category !== novel.primary_category ? ` | 来源分类：${escapeHtml(novel.source_category)}` : ''}
            </p>

            <div class="rating-section">
              <div class="rating-display">
                <span class="rating-stars">${'★'.repeat(Math.round(ratings.average || 0))}${'☆'.repeat(5 - Math.round(ratings.average || 0))}</span>
                <span class="rating-score">${(ratings.average || 0).toFixed(1)}</span>
                <span class="rating-count">(${ratings.count}人评分)</span>
              </div>
              ${token ? `<div class="user-rating">
                <span>我的评分：</span>
                ${[1,2,3,4,5].map((star) => `
                  <span class="star ${userRating.rating >= star ? 'active' : ''}" onclick="rateNovel(${star})">★</span>
                `).join('')}
              </div>` : ''}
            </div>

            <div class="novel-reading-hint">
              <strong>阅读提示</strong>
              <p>${escapeHtml(buildReadingHint(novel, progress))}</p>
            </div>

            <div class="novel-hero-actions">
              ${buildPrimaryAction(novel, progress)}
              <button class="btn-secondary" onclick="scrollToCatalog()">查看目录</button>
            </div>

            ${renderMembershipConversionCard(novel, window.__memberCenter || null, progress)}

            <div class="novel-status-grid">
              <div class="novel-status-card">
                <span class="novel-status-label">阅读状态</span>
                <strong>${novel.is_premium ? '会员作品' : '普通作品'}</strong>
                <p>${escapeHtml(buildReadingStatus(novel))}</p>
              </div>
              <div class="novel-status-card">
                <span class="novel-status-label">推荐阅读</span>
                <strong>${progress ? '从断点继续' : '从首章试读'}</strong>
                <p>${progress ? `上次已读到第 ${progress.chapter_number} 章，适合直接接着看。` : '先从前几章判断设定、文风和节奏，再决定是否继续追更。'}</p>
              </div>
            </div>

            ${novel.description ? `<p class="novel-description">${escapeHtml(novel.description)}</p>` : ''}
          </div>
        </section>
      `;

      document.title = `${novel.title} - 中文小说阅读网`;
      updateMetaTag('meta[name="description"]', novel.description || `在线阅读《${novel.title}》`);
      updateMetaTag('meta[property="og:title"]', `${novel.title} - 中文小说阅读网`);
    }

    function renderChapterList(previewPayload, chapters) {
      const preview = previewPayload.preview || [];
      const previewHTML = renderChapterItems(preview);
      const visibleChapters = token
        ? chapterListState.chapters.slice(0, chapterListState.visibleCount)
        : [];
      const visibleChapterHTML = token ? renderChapterItems(visibleChapters) : '';
      const hasMoreChapters = token && chapterListState.chapters.length < chapterListState.total;

      document.getElementById('chapterList').innerHTML = `
        <section class="chapter-list-container chapter-preview" id="chapterCatalog">
          <div class="chapter-list-header">
            <div>
              <p class="novel-kicker">目录预览</p>
              <h3>先看前几章，再决定继续追更</h3>
            </div>
            <p class="chapter-list-copy">当前共 ${previewPayload.chapter_count} 章，详情页先展示前 ${preview.length} 章预览。</p>
          </div>
          <div class="chapter-list">${previewHTML}</div>
          <div class="chapter-list-actions">
            ${token
              ? `<button class="btn-secondary" onclick="startReading()">从第 1 章开始</button>`
              : `<a class="btn-secondary btn-link" href="login.html">登录后查看完整目录</a>`
            }
          </div>
          ${token ? `
            <div class="chapter-list-panel">
              <div class="chapter-list-header">
                <div>
                  <p class="novel-kicker">完整目录</p>
                  <h3>继续挑章节或直接续读</h3>
                </div>
                <p class="chapter-list-copy chapter-list-progress">当前已显示 ${visibleChapters.length} / ${chapterListState.total} 章</p>
              </div>
              <div class="chapter-list">${visibleChapterHTML}</div>
              <div class="chapter-list-actions chapter-list-load-more">
                ${hasMoreChapters ? `<button class="btn-secondary" onclick="loadMoreChapters()" id="loadMoreBtn">加载更多章节</button>` : ''}
                ${chapterListState.chapters.length > 0 ? '<button class="btn-link chapter-collapse-btn" onclick="collapseChapterList()">收起目录</button>' : ''}
              </div>
            </div>
          ` : ''}
        </section>
      `;
    }

    async function loadChaptersPage(page) {
      const response = await fetch(`${API_URL}/novels/${novelId}/chapters?page=${page}&limit=${chapterListState.limit}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!response.ok) return [];
      const data = await response.json();
      if (page === 1) {
        chapterListState.total = data.total;
      }
      return data.chapters || [];
    }

    async function loadMoreChapters() {
      if (chapterListState.loading) return;
      chapterListState.loading = true;
      const btn = document.getElementById('loadMoreBtn');
      if (btn) btn.textContent = '加载中...';
      try {
        chapterListState.page++;
        const newChapters = await loadChaptersPage(chapterListState.page);
        chapterListState.chapters.push(...newChapters);
        chapterListState.visibleCount = chapterListState.chapters.length;
        renderChapterList({ preview: chapterListState.preview, chapter_count: chapterListState.chapterCount }, chapterListState.chapters);
      } finally {
        chapterListState.loading = false;
      }
    }

    function collapseChapterList() {
      chapterListState.visibleCount = chapterListState.chapters.length;
      chapterListState.page = 1;
      renderChapterList({ preview: chapterListState.preview, chapter_count: chapterListState.chapterCount }, chapterListState.chapters);
      const catalog = document.getElementById('chapterCatalog');
      if (catalog) {
        catalog.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderRecommendations(recommendationPayload) {
      const recommendations = recommendationPayload.recommendations || [];

      if (recommendations.length === 0) {
        document.getElementById('recommendationsSection').innerHTML = '';
        return;
      }

      const cards = recommendations.map((novel) => `
        <article class="recommendation-card" onclick="location.href='novel.html?id=${novel.id}'">
          <div class="recommendation-cover-wrap">
            ${renderCoverImage(novel.cover_url, novel.title, 'recommendation-cover')}
          </div>
          <div class="recommendation-body">
            <h4>${escapeHtml(novel.title)}</h4>
            <p class="recommendation-meta">${escapeHtml(novel.author)}${novel.primary_category ? ` · ${escapeHtml(novel.primary_category)}` : ''}</p>
            <p class="recommendation-copy">${escapeHtml((novel.description || '同类热门作品，适合接着看。').slice(0, 58))}</p>
            <p class="recommendation-foot">${novel.chapter_count || 0} 章${novel.is_premium ? ' · 会员作品' : ' · 可直接阅读'}</p>
          </div>
        </article>
      `).join('');

      document.getElementById('recommendationsSection').innerHTML = `
        <section class="chapter-list-container novel-recommendations">
          <div class="chapter-list-header">
            <div>
              <p class="novel-kicker">同类推荐</p>
              <h3>这类作品里，还可以继续看这些</h3>
            </div>
            <p class="chapter-list-copy">按同分类热门程度推荐，适合看完简介后继续找下一本。</p>
          </div>
          <div class="recommendation-grid">${cards}</div>
        </section>
      `;
    }

    async function loadRecommendations() {
      const response = await fetch(`${API_URL}/novels/${novelId}/recommendations`);
      if (!response.ok) {
        return { recommendations: [] };
      }

      return response.json();
    }

    async function loadNovelDetail() {
      try {
        const requests = [
          fetch(`${API_URL}/novels/${novelId}`),
          fetch(`${API_URL}/ratings/${novelId}`),
          fetch(`${API_URL}/novels/${novelId}/chapter-preview`),
          loadRecommendations()
        ];

        if (token) {
          requests.push(
            fetch(`${API_URL}/novels/${novelId}/chapters?page=1&limit=${chapterListState.limit}`, {
              headers: { 'Authorization': `Bearer ${token}` }
            }),
            fetch(`${API_URL}/reading-progress/${novelId}`, {
              headers: { 'Authorization': `Bearer ${token}` }
            }),
            fetch(`${API_URL}/ratings/${novelId}/user`, {
              headers: { 'Authorization': `Bearer ${token}` }
            }),
            loadMemberCenter()
          );
        }

        const responses = await Promise.all(requests);
        const [novelRes, ratingsRes, previewRes, recommendationPayload] = responses;

        if (!novelRes.ok) {
          throw new Error('加载小说失败');
        }

        const novel = await novelRes.json();
        const ratings = await ratingsRes.json();
        const previewPayload = previewRes.ok ? await previewRes.json() : { preview: [], chapter_count: novel.chapter_count || 0 };

        let chapters = [];
        let progress = null;
        let userRating = { rating: 0 };

        if (token && responses.length > 4) {
          const chaptersData = responses[4].ok ? await responses[4].json() : { chapters: [], total: 0 };
          chapters = chaptersData.chapters || [];
          chapterListState.total = chaptersData.total || 0;
          progress = responses[5].ok ? await responses[5].json() : null;
          userRating = responses[6].ok ? await responses[6].json() : { rating: 0 };
          window.__memberCenter = responses[7] || null;
        } else {
          window.__memberCenter = null;
        }

        chapterListState.preview = previewPayload.preview || [];
        chapterListState.chapterCount = previewPayload.chapter_count || novel.chapter_count || 0;
        chapterListState.chapters = chapters;
        chapterListState.visibleCount = chapters.length;
        chapterListState.page = 1;
        chapterListState.loaded = chapters.length > 0;

        renderNovelDetail(novel, ratings, progress, userRating);
        renderChapterList(previewPayload, chapters);
        renderRecommendations(recommendationPayload);
      } catch (error) {
        document.getElementById('novelDetail').innerHTML = `<p class="error">加载失败：${escapeHtml(error.message)}</p>`;
      }
    }

    function startReading() {
      location.href = `reader.html?novelId=${novelId}&chapter=1`;
    }

    function continueReading(chapterNumber) {
      location.href = `reader.html?novelId=${novelId}&chapter=${chapterNumber}`;
    }

    function readChapter(chapterNumber) {
      location.href = `reader.html?novelId=${novelId}&chapter=${chapterNumber}`;
    }

    function scrollToCatalog() {
      const catalog = document.getElementById('chapterCatalog');
      if (catalog) {
        catalog.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    async function rateNovel(rating) {
      if (!token) {
        alert('请先登录');
        location.href = 'login.html';
        return;
      }
      try {
        const response = await fetch(`${API_URL}/ratings`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            novel_id: parseInt(novelId),
            rating: rating
          })
        });

        if (response.ok) {
          loadNovelDetail(); // 重新加载以更新评分
        } else {
          alert('评分失败');
        }
      } catch (error) {
        console.error('评分失败', error);
      }
    }

    loadNovelDetail();
  </script>
</body>
</html>
