<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="按分类浏览中文小说 — 玄幻、都市、修仙等热门分类，快速找到你喜欢的小说类型">
  <meta property="og:title" content="分类浏览 - 中文小说阅读网">
  <meta property="og:description" content="按分类浏览中文小说，快速找到你喜欢的小说类型">
  <meta property="og:type" content="website">
  <title>分类浏览 - 中文小说阅读网</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📚 中文小说阅读网</h1>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="categories.html">分类</a>
      <a href="rankings.html">榜单</a>
      <a href="history.html" id="historyLink" style="display:none;">阅读历史</a>
      <a href="membership.html">会员中心</a>
      <a href="login.html" id="loginLink">登录</a>
      <a href="#" id="logoutLink" style="display:none;">退出</a>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h2>分类浏览</h2>
      <p class="page-header-desc">选择你感兴趣的分类，发现更多好书</p>
    </div>
    <div class="category-grid" id="categoryGrid"></div>
  </div>

  <script src="runtime-config.js"></script>
  <script>
    const API_URL = window.NOVEL_APP_CONFIG.apiUrl;
    const token = localStorage.getItem('token');

    if (token) {
      document.getElementById('loginLink').style.display = 'none';
      document.getElementById('logoutLink').style.display = 'block';
      document.getElementById('historyLink').style.display = 'block';
    }

    document.getElementById('logoutLink').addEventListener('click', () => {
      localStorage.removeItem('token');
      location.reload();
    });

    const categoryIcons = {
      '玄幻': '🔮', '修仙': '🏔️', '都市': '🏙️', '言情': '💕',
      '武侠': '⚔️', '科幻': '🚀', '历史': '📜', '悬疑': '🔍',
      '恐怖': '👻', '军事': '🎖️', '游戏': '🎮', '体育': '⚽',
      '奇幻': '🧙', '仙侠': '☁️', '网游': '💻', '灵异': '🌙',
    };

    function getIcon(category) {
      return categoryIcons[category] || '📖';
    }

    async function loadCategories() {
      try {
        const response = await fetch(`${API_URL}/novel-categories`);
        const categories = await response.json();
        const grid = document.getElementById('categoryGrid');

        grid.innerHTML = categories.map(item => `
          <a class="category-card" href="index.html?category=${encodeURIComponent(item.category)}">
            <span class="category-card-icon">${getIcon(item.category)}</span>
            <span class="category-card-name">${escapeHtml(item.category)}</span>
            <span class="category-card-count">${item.count} 本</span>
          </a>
        `).join('');
      } catch (error) {
        console.error('加载分类失败', error);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    loadCategories();
  </script>
</body>
</html>
